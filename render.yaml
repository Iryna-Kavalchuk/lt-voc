services:
  - type: web
    name: lithuanian-vocab
    runtime: node
    rootDir: lithuanian-vocab
    buildCommand: >
      cd client && npm install && npm run build && cd .. &&
      cd server && npm install && npm run build && cd ..
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: 10000
